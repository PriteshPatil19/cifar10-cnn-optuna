default:
  epochs: 30
  momentum: 0.8
  num_trials: 10
  dataset: cifar10


optimized:
  lr:
    type: float
    min: 1e-5
    max: 1e-3

  batch_size:
    type: categorical
    values: [64, 128, 256]

  optimizer:
    type: categorical
    values: [Adam, SGD, RMSprop]

  num_conv_layers:
    type: int
    min: 2
    max: 6

  num_filters:
    type: categorical
    values: [32, 64, 128]

